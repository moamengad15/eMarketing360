<!-- ═══════════════════════════════════════════════════════
     HERO SECTION — pixel-perfect match to screenshot
     Layout: centered, white background, grid pattern
     ═══════════════════════════════════════════════════════ -->
<section class="hero-section">

  <!-- Subtle dot-grid background -->
  <div class="hero-grid-bg" aria-hidden="true"></div>

  <!-- Gradient glow blobs -->
  <div class="hero-glow hero-glow-1" aria-hidden="true"></div>
  <div class="hero-glow hero-glow-2" aria-hidden="true"></div>

  <div class="page-container">
    <div class="hero-center">

      <!-- Top pill badge -->
      <div class="hero-badge">
        <span class="hero-badge-dot"></span>
        e-Marketing360 للتسويق الإلكتروني
      </div>

      <!-- ── Main Heading ── -->
      <!--
        Line 1: إستمتع بقوة [MEGAPHONE PILL] التسويق الرقمي
        Line 2: خدمات تسويق إلكتروني تعزز [BLUE TYPED WORD]
      -->
      <h1 class="hero-h1">

        <!-- Line 1: right-to-left RTL rendering -->
        <span class="hero-line hero-line-1">
          <!-- In RTL the order renders: إستمتع بقوة | pill | التسويق الرقمي -->
          <span class="hero-word-dark">إستمتع بقوة&nbsp;</span>
          <span class="hero-megaphone-pill" aria-hidden="true">
            <img
              src="https://graphica-marketing.com/wp-content/uploads/2025/12/megaphone-1024x415.webp"
              onerror="this.src='assets/images/megaphone-pill.svg'"
              alt="📣"
              class="hero-megaphone-img" />
          </span>
          <span class="hero-word-dark">&nbsp;التسويق الرقمي</span>
        </span>

        <!-- Line 2 -->
        <span class="hero-line hero-line-2">
          <span class="hero-word-dark">خدمات تسويق إلكتروني تعزز&nbsp;</span>
          <span class="hero-typed-word">
            <span class="dynamic-text-output"></span><span class="typed-cursor">|</span>
          </span>
        </span>

      </h1>

      <!-- Description -->
      <p class="hero-description">
        نبتكر استراتيجيات تسويق إلكتروني حديثة تجمع بين الإبداع والتقنية<br>
        لتعزيز حضورك الرقمي وتحقيق نمو فعلي لعلامتك.
      </p>

      <!-- CTA Button -->
      <div class="hero-cta-wrap">
        <a href="mailto:info@e-marketing360.com" target="_blank" rel="nofollow" class="hero-cta-btn">
          إنطلق الآن
          <span class="hero-cta-arrow">←</span>
        </a>
      </div>

      <!-- Partners note -->
      <p class="hero-partners-note">
        نقدم خدماتنا بدعم من <strong>شركائنا</strong>
      </p>

    </div>
  </div>
</section>
