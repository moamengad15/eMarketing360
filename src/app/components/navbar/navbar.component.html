<!-- ═══════════════════════════════════════════════════════
     NAVBAR — e-Marketing360
     White boxed card, numbered nav items, router links,
     NO: WhatsApp / dark-mode / social icons
     KEEP: Search (functional), Language toggle, Profile
     ═══════════════════════════════════════════════════════ -->

<!-- Offer strip -->
<div class="offer-strip">
  <div class="page-container">
    <p class="offer-strip-text">
      {{ 'offer.strip' | t }}
    </p>
  </div>
</div>

<!-- Boxed white header -->
<header class="site-header" [class.header-sticky]="isSticky">
  <div class="page-container">
    <nav class="nav-inner" role="navigation" [attr.aria-label]="'nav.menu' | t">

      <!-- Hamburger (leftmost in RTL) -->
      <button
        class="nav-hamburger"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen"
        [attr.aria-label]="'nav.menu' | t">
        <span [class.open]="isMenuOpen"></span>
        <span [class.open]="isMenuOpen"></span>
        <span [class.open]="isMenuOpen"></span>
      </button>

      <!-- Desktop nav links -->
      <ul class="nav-links" role="list">
        <li
          *ngFor="let link of navLinks; let i = index; trackBy: trackByLabelKey"
          class="nav-item"
          [class.has-sub]="hasChildren(link)"
          [class.is-active]="isActive(link)">

          <button
            class="nav-link"
            [class.active]="isActive(link)"
            (click)="hasChildren(link)
              ? toggleSubmenu(link.labelKey)
              : navigate(link.route, link.fragment)">
            <span class="nav-num">0{{ i + 1 }}</span>
            {{ link.labelKey | t }}
            <i *ngIf="hasChildren(link)"
               class="fa-solid fa-chevron-down nav-chevron"
               [class.rotated]="activeSubmenu === link.labelKey"></i>
          </button>

          <!-- Dropdown — routerLink children -->
          <ul
            *ngIf="hasChildren(link) && activeSubmenu === link.labelKey"
            class="nav-dropdown"
            role="menu">
            <li *ngFor="let child of link.children; trackBy: trackByChildKey" role="none">
              <button
                class="nav-dropdown-item"
                role="menuitem"
                (click)="navigate(child.route)">
                {{ child.labelKey | t }}
              </button>
            </li>
          </ul>

        </li>
      </ul>

      <!-- Right cluster: Search + Lang + Profile + Logo -->
      <div class="nav-right">

        <!-- Search (functional) -->
        <div class="nav-search-wrap" [class.open]="isSearchOpen">
          <button class="nav-icon-btn" (click)="toggleSearch()" [attr.aria-label]="'nav.search' | t">
            <i class="fa-solid" [class.fa-magnifying-glass]="!isSearchOpen" [class.fa-xmark]="isSearchOpen"></i>
          </button>
          <div class="nav-search-box" *ngIf="isSearchOpen">
            <input
              type="search"
              class="nav-search-input"
              [placeholder]="'nav.searchPlaceholder' | t"
              [(ngModel)]="searchQuery"
              (keyup.enter)="onSearch(searchQuery)"
              autofocus />
            <button class="nav-search-submit" (click)="onSearch(searchQuery)" [attr.aria-label]="'nav.search' | t">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
        </div>

        <!-- Language toggle (UI-ready for AR/EN) -->
        <button class="nav-lang-btn" (click)="toggleLang()" [attr.aria-label]="'nav.toggleLang' | t">
          <i class="fa-solid fa-globe" style="font-size:.8rem; margin-left:.3rem;"></i>
          {{ ts.lang() === 'ar' ? 'EN' : 'AR' }}
        </button>

        <!-- Profile button (future-ready auth) -->
        <button class="nav-profile-btn" [attr.aria-label]="'nav.profile' | t">
          <i class="fa-regular fa-user"></i>
          <span class="nav-profile-label">{{ 'nav.account' | t }}</span>
        </button>

        <!-- Logo (rightmost in RTL) -->
        <a class="nav-logo" (click)="navigate('/')" style="cursor:pointer;" [attr.aria-label]="'nav.homeAria' | t">
          <img
            src="assets/images/logo-emarketing360.png"
            alt="e-Marketing360 Digital Agency"
            class="nav-logo-img" />
        </a>

      </div>
    </nav>
  </div>
</header>

<!-- Search overlay (full-width, below header) -->
<div class="nav-search-overlay" [class.visible]="isSearchOpen" (click)="toggleSearch()">
  <div class="page-container" (click)="$event.stopPropagation()">
    <div class="search-overlay-inner">
      <input
        type="search"
        class="search-overlay-input"
        [placeholder]="'nav.searchOverlayPlaceholder' | t"
        [(ngModel)]="searchQuery"
        (keyup.enter)="onSearch(searchQuery)" />
      <button class="search-overlay-btn" (click)="onSearch(searchQuery)">
        <i class="fa-solid fa-magnifying-glass"></i> {{ 'nav.searchSubmit' | t }}
      </button>
    </div>
  </div>
</div>

<!-- ═══ Full-screen hamburger popup ════════════════════════ -->
<div class="ham-popup" [class.open]="isMenuOpen" role="dialog" aria-modal="true" [attr.aria-label]="'nav.menuFull' | t">

  <div class="ham-popup-header page-container">
    <a class="ham-logo" (click)="navigate('/')" style="cursor:pointer;">
      <img src="assets/images/logo-emarketing360.png" alt="e-Marketing360" class="ham-logo-img" />
    </a>
    <button class="ham-close-btn" (click)="closeMenu()" [attr.aria-label]="'nav.close' | t">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <div class="ham-popup-body page-container">

    <!-- Primary nav links -->
    <nav class="ham-menu-col" [attr.aria-label]="'nav.menuFull' | t">
      <ul class="ham-menu-list">
        <li *ngFor="let link of navLinks; trackBy: trackByLabelKey">
          <button
            class="ham-menu-link"
            [class.active]="isActive(link)"
            (click)="hasChildren(link)
              ? toggleSubmenu(link.labelKey)
              : navigate(link.route, link.fragment)">
            {{ link.labelKey | t }}
            <i *ngIf="hasChildren(link)"
               class="fa-solid fa-chevron-down ham-chev"
               [class.rotated]="activeSubmenu === link.labelKey"></i>
          </button>

          <ul *ngIf="hasChildren(link) && activeSubmenu === link.labelKey" class="ham-sub-list">
            <li *ngFor="let child of link.children; trackBy: trackByChildKey">
              <button class="ham-sub-link" (click)="navigate(child.route)">
                <i class="fa-solid fa-arrow-left ham-sub-arrow"></i>
                {{ child.labelKey | t }}
              </button>
            </li>
          </ul>
        </li>
      </ul>
    </nav>

    <!-- Office info + contact (email only) -->
    <div class="ham-offices-col">
      <div class="ham-office">
        <strong>{{ 'ham.saOffice' | t }}</strong><br>
        {{ 'ham.saAddr' | t }}<br>
        <a [href]="mailtoInfo" class="ham-email-link">{{ displayInfoEmail }}</a>
      </div>
      <div class="ham-office">
        <strong>{{ 'ham.ukOffice' | t }}</strong><br>
        {{ 'ham.ukAddr' | t }}<br>
        <a [href]="mailtoInfo" class="ham-email-link">{{ displayInfoEmail }}</a>
      </div>
      <div class="ham-office">
        <strong>{{ 'ham.usOffice' | t }}</strong><br>
        {{ 'ham.usAddr' | t }}<br>
        <a [href]="mailtoInfo" class="ham-email-link">{{ displayInfoEmail }}</a>
      </div>

      <!-- Contact email CTA -->
      <a [href]="mailtoInfo" class="ham-email-cta">
        <i class="fa-solid fa-envelope"></i>
        {{ displayInfoEmail }}
      </a>

      <!-- Language toggle in menu -->
      <button class="ham-lang-btn" (click)="toggleLang()">
        <i class="fa-solid fa-globe"></i>
        {{ ts.lang() === 'ar' ? ('nav.langSwitchEn' | t) : ('nav.langSwitchAr' | t) }}
      </button>
    </div>

  </div>
</div>

<!-- Backdrop -->
<div class="ham-backdrop" [class.open]="isMenuOpen" (click)="closeMenu()"></div>
