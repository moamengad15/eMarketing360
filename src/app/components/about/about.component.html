<!-- About / Why Us Section -->
<div class="page-container">

  <div class="about-grid">
    <!-- Left: text content -->
    <div class="about-content">

      <!-- Video CTA -->
      <div class="about-video-btn">
        <button class="about-play-btn" (click)="openVideo()" [attr.aria-label]="'about.play' | t">
          <i class="fa-solid fa-play"></i>
        </button>
        <span class="about-play-label">{{ 'about.play' | t }}</span>
      </div>

      <p class="about-eyebrow">{{ 'about.eyebrow1' | t }}</p>

      <h2 class="about-h2">{{ 'about.h2' | t }}</h2>

      <div class="about-eyebrow" style="margin-top:.5rem;">{{ 'about.eyebrow2' | t }}</div>
      <h3 class="about-h3">{{ 'about.h3' | t }}</h3>

      <p class="about-text" [innerHTML]="'about.body' | t"></p>

      <div style="margin-top:1.5rem;">
        <a href="#services" class="btn btn-outline btn-sm" onclick="event.preventDefault();document.getElementById('services').scrollIntoView({behavior:'smooth'})">
          {{ 'about.cta' | t }}
        </a>
      </div>
    </div>

    <!-- Right: Banner image -->
    <div class="about-image-side">
      <img
        [src]="bannerImage"
        [alt]="'about.imgAlt' | t"
        class="about-img"
        loading="lazy" />
    </div>
  </div>

  <!-- Video popup -->
  <div class="video-popup-overlay" *ngIf="isVideoOpen" (click)="closeVideo()">
    <div class="video-popup-close-bar">
      <button class="video-popup-close" (click)="closeVideo()" [attr.aria-label]="'nav.close' | t">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="video-popup-frame" (click)="$event.stopPropagation()">
      <iframe
        [src]="safeVideoUrl"
        allow="autoplay; fullscreen"
        allowfullscreen
        [title]="'about.videoTitle' | t">
      </iframe>
    </div>
  </div>

</div>
