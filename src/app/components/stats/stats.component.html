<div class="stats-section">
  <div class="page-container">

    <!-- Header -->
    <div class="stats-header section-header">
      <span class="eyebrow">{{ 'stats.eyebrow' | t }}</span>
      <h2>{{ 'stats.title' | t }}</h2>
    </div>

    <!-- Counter Grid -->
    <div class="stats-grid">
      <div *ngFor="let stat of stats; trackBy: trackByLabelKey" class="stat-card">
        <div class="stat-icon-wrap">
          <i [class]="stat.icon"></i>
        </div>
        <div class="stat-number">
          <span class="stat-prefix">{{ stat.prefix }}</span>{{ stat.current }}
        </div>
        <h6 class="stat-label">{{ stat.labelKey | t }}</h6>
      </div>
    </div>

    <!-- Company Story -->
    <div class="company-story">
      <!-- Image -->
      <div>
        <img
          src="https://graphica-marketing.com/wp-content/uploads/2024/06/banner-03.png"
          [alt]="'stats.story.imgAlt' | t"
          class="company-story-img"
          loading="lazy" />
      </div>

      <!-- Text -->
      <div>
        <p class="company-story-eyebrow">{{ 'stats.story.eyebrow' | t }}</p>
        <h2>{{ 'stats.story.title' | t }}</h2>
        <p class="company-story-text" [innerHTML]="'stats.story.body' | t"></p>

        <div class="company-mini-stats">
          <div *ngFor="let cs of companyStats" class="mini-stat">
            <span class="mini-stat-num">{{ cs.current }}</span>
            <span class="mini-stat-label">{{ cs.labelKey | t }}</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
