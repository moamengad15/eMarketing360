<div class="page-container">

  <!-- Intro row -->
  <div class="services-intro">
    <div class="services-intro-text">
      <span class="eyebrow">{{ 'services.intro.eyebrow' | t }}</span>
      <h2>{{ 'services.intro.title' | t }}</h2>
      <p [innerHTML]="'services.intro.body' | t"></p>
    </div>
    <div>
      <a [routerLink]="['/services']" class="btn btn-outline">{{ 'services.browse' | t }}</a>
    </div>
  </div>

  <!-- Services Grid -->
  <div class="services-grid">
    <div *ngFor="let service of allServices; trackBy: trackByListKey" class="service-card">
      <div class="service-icon-wrap">
        <i [class]="service.icon"></i>
      </div>
      <h5 class="service-title">{{ svcTitleKey(service) | t }}</h5>
      <p class="service-desc">{{ svcDescKey(service) | t }}</p>
      <a [routerLink]="[service.ctaUrl]" class="btn btn-sm btn-primary">{{ 'btn.more' | t }}</a>
    </div>
  </div>

</div>
