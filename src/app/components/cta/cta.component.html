<div class="page-container">
  <div class="cta-section">

    <div class="cta-text">
      <p class="cta-title-small">{{ 'cta.line1' | t }}</p>
      <h2 class="cta-title">
        {{ 'cta.line2' | t }}
      </h2>
    </div>

    <div class="cta-actions">
      <a [href]="mailtoInfo" class="btn btn-white cta-primary-btn">
        <i class="fa-solid fa-envelope"></i>
        {{ 'cta.primary' | t }}
      </a>
      <a [routerLink]="['/services']" class="cta-secondary-link">
        {{ 'cta.secondary' | t }} <i class="fa-solid fa-arrow-left"></i>
      </a>
    </div>

  </div>
</div>
