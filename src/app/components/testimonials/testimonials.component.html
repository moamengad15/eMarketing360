<div class="page-container">

  <div class="section-header">
    <span class="eyebrow">{{ 'testimonials.eyebrow' | t }}</span>
    <h2>{{ 'testimonials.title' | t }}</h2>
  </div>

  <!-- Tab nav -->
  <div class="testimonials-tabs-nav">
    <button
      *ngFor="let tab of tabs; trackBy: trackById"
      class="testimonials-tab-btn"
      [class.active]="activeTabId === tab.id"
      (click)="selectTab(tab.id)">
      {{ tab.labelKey | t }}
    </button>
  </div>

  <!-- Active slide -->
  <div class="testimonial-card">
    <div class="testimonial-stars">
      <i class="fa-solid fa-star"></i>
      <i class="fa-solid fa-star"></i>
      <i class="fa-solid fa-star"></i>
      <i class="fa-solid fa-star"></i>
      <i class="fa-solid fa-star"></i>
    </div>
    <h5 class="testimonial-headline">{{ k('headline') | t }}</h5>
    <p class="testimonial-text">{{ k('content') | t }}</p>
    <div class="testimonial-author">
      <img [src]="avatars[activeTid]" [alt]="k('name') | t" class="testimonial-avatar" loading="lazy" />
      <div>
        <p class="testimonial-name">{{ k('name') | t }}</p>
        <p class="testimonial-role">{{ k('role') | t }}</p>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="testimonial-slider-controls">
    <button class="slider-arrow-btn" (click)="prevSlide()" [attr.aria-label]="'portfolio.lbPrev' | t">
      <i class="fa-solid fa-chevron-right"></i>
    </button>
    <div class="slider-dots">
      <button
        *ngFor="let _t of testimonialIds; let i = index"
        class="slider-dot"
        [class.active]="i === activeSlideIndex"
        (click)="activeSlideIndex = i">
      </button>
    </div>
    <button class="slider-arrow-btn" (click)="nextSlide()" [attr.aria-label]="'portfolio.lbNext' | t">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
  </div>

</div>
