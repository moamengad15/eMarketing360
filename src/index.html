<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <title>e-Marketing360 | أفضل شركة تسويق إلكتروني</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="e-Marketing360 — وكالة تسويق إلكتروني متكاملة. خدمات تصميم مواقع، متاجر إلكترونية، سوشيال ميديا، SEO وهويات بصرية احترافية." />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <!-- Arabic Google Font: Cairo (400 600 700 800) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Language direction init (AR default, persisted in localStorage) -->
  <script>
    (function () {
      var lang = localStorage.getItem('em360-lang') || 'ar';
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
